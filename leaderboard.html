<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hall of Fame | CertiChain</title>
    <!-- Imports -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #fbbf24;
            --silver: #94a3b8;
            --bronze: #d97706;
            --dark: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
        }

        body {
            background-color: var(--dark);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
        }

        .navbar {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.9);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 900;
            font-size: 1.5rem;
            color: #3b82f6;
            text-decoration: none;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Hero */
        .hero {
            text-align: center;
            margin-bottom: 50px;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin: 0;
            background: linear-gradient(135deg, #fcd34d 0%, #f59e0b 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .hero p {
            color: #94a3b8;
            font-size: 1.2rem;
            margin-top: 10px;
        }

        /* Top 3 Podium */
        .podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            margin-bottom: 60px;
            height: 300px;
        }

        .podium-place {
            text-align: center;
            position: relative;
            background: var(--card);
            border-radius: 15px 15px 0 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s;
        }

        .podium-place:hover {
            transform: translateY(-10px);
        }

        .p-1 {
            height: 100%;
            width: 220px;
            border-color: var(--gold);
            background: radial-gradient(circle at top, rgba(251, 191, 36, 0.2), var(--card));
            order: 2;
            z-index: 2;
        }

        .p-2 {
            height: 85%;
            width: 200px;
            border-color: var(--silver);
            order: 1;
        }

        .p-3 {
            height: 70%;
            width: 200px;
            border-color: var(--bronze);
            order: 3;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 15px;
            border: 3px solid white;
            object-fit: cover;
        }

        .p-1 .avatar {
            border-color: var(--gold);
            width: 100px;
            height: 100px;
        }

        .p-2 .avatar {
            border-color: var(--silver);
        }

        .p-3 .avatar {
            border-color: var(--bronze);
        }

        .p-name {
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .p-score {
            color: var(--gold);
            font-weight: 900;
            font-size: 1.5rem;
        }

        .rank-badge {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: black;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
        }

        .p-1 .rank-badge {
            background: var(--gold);
        }

        .p-2 .rank-badge {
            background: var(--silver);
        }

        .p-3 .rank-badge {
            background: var(--bronze);
        }


        /* List */
        .leaderboard-list {
            background: var(--card);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .list-row {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.2s;
        }

        .list-row:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .list-row.header {
            background: rgba(0, 0, 0, 0.2);
            font-weight: bold;
            color: #94a3b8;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .col-rank {
            width: 50px;
            font-weight: bold;
            color: #64748b;
        }

        .col-user {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .col-certs {
            width: 150px;
            text-align: center;
        }

        .col-points {
            width: 100px;
            text-align: right;
            font-weight: 700;
            color: #fcd34d;
        }

        /* Current User Sticky Bar */
        .sticky-user {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to right, #3b82f6, #2563eb);
            padding: 15px 0;
            box-shadow: 0 -10px 20px rgba(0, 0, 0, 0.3);
            z-index: 50;
        }

        .sticky-content {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <a href="student_dashboard.html" class="logo">🏆 Hall of Fame</a>
        <a href="student_dashboard.html" class="back-btn">Back to Dashboard</a>
    </nav>

    <div class="container">
        <div class="hero">
            <h1>Top Scholars</h1>
            <p>Recognizing the most certified professionals in the global network.</p>
        </div>

        <!-- Podium -->
        <div class="podium">
            <!-- 2nd -->
            <div class="podium-place p-2">
                <div class="rank-badge">2</div>
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Sarah" class="avatar">
                <div class="p-name">Sarah Jenkins</div>
                <div class="p-score">3,850 XP</div>
                <div style="color:#94a3b8; font-size:0.9rem;">18 Certs</div>
            </div>

            <!-- 1st -->
            <div class="podium-place p-1">
                <div class="rank-badge">1</div>
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Alex" class="avatar">
                <div class="p-name">Alex Chen</div>
                <div class="p-score">4,200 XP</div>
                <div style="color:#fcd34d; font-size:0.9rem;">22 Certs</div>
            </div>

            <!-- 3rd -->
            <div class="podium-place p-3">
                <div class="rank-badge">3</div>
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Marcus" class="avatar">
                <div class="p-name">Marcus D.</div>
                <div class="p-score">3,420 XP</div>
                <div style="color:#fdba74; font-size:0.9rem;">15 Certs</div>
            </div>
        </div>

        <!-- Full List -->
        <div class="leaderboard-list" id="list">
            <div class="list-row header">
                <div class="col-rank">#</div>
                <div class="col-user">Student</div>
                <div class="col-certs">Certificates</div>
                <div class="col-points">Total XP</div>
            </div>
            <!-- Rows injected -->
        </div>

        <div style="height: 100px;"></div> <!-- Spacer for sticky bar -->
    </div>

    <div class="sticky-user">
        <div class="sticky-content">
            <div style="display:flex; align-items:center; gap:15px;">
                <div style="font-weight:bold; font-size:1.2rem;">#42</div>
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix"
                    style="width:40px; height:40px; border-radius:50%; border:2px solid white;">
                <div>
                    <div style="font-weight:bold;">You</div>
                    <div style="font-size:0.8rem; opacity:0.8;">Keep learning to climb the ranks!</div>
                </div>
            </div>
            <div style="font-weight:900; font-size:1.2rem;">1,250 XP</div>
        </div>
    </div>

    <script>
        // Mock Data
        const mockUsers = [
            { name: "Priya Patel", certs: 14, xp: 3100 },
            { name: "David Kim", certs: 13, xp: 2950 },
            { name: "Emily Blunt", certs: 12, xp: 2800 },
            { name: "Michael Ross", certs: 11, xp: 2600 },
            { name: "Jessica Day", certs: 10, xp: 2400 },
            { name: "Nick Miller", certs: 9, xp: 2200 },
            { name: "Winston B.", certs: 9, xp: 2150 },
            { name: "Schmidt", certs: 8, xp: 1900 },
            { name: "Coach", certs: 7, xp: 1750 },
            { name: "Aly Nelson", certs: 6, xp: 1500 }
        ];

        // Load Real User Data
        const user = JSON.parse(localStorage.getItem('certichain_user') || '{}');
        const certs = JSON.parse(localStorage.getItem('certichain_certificates') || '[]');

        const userName = user.name || "You";
        // Calculate standard XP: 200 XP per cert
        const userXP = certs.length * 200 + 500; // 500 bonus for joining
        const userCerts = certs.length;

        const realUser = {
            name: userName,
            certs: userCerts,
            xp: userXP,
            isMe: true,
            avatar: user.profileImage || `https://api.dicebear.com/7.x/avataaars/svg?seed=${userName}`
        };

        // Combine and Sort
        let allUsers = [...mockUsers, realUser];
        allUsers.sort((a, b) => b.xp - a.xp);

        // Render List
        const container = document.getElementById('list');
        const stickyBar = document.querySelector('.sticky-content');

        // Find my rank
        let myRank = allUsers.findIndex(u => u.isMe) + 1;
        // Adjust for top 3 (if I'm in top 3, logic needs to handle that, but for now list starts at 4 in UI technically, 
        // but let's render strictly based on the mock IDs provided in HTML? 
        // actually the HTML hardcodes the top 3 visually. 
        // To be simpler, we will just render the LIST (ranks 4+) and if 'You' are in top 3, we might need to update the top 3 DOM.
        // For this 'Update', let's just render the list and update the sticky bar. 
        // If 'You' are top 3, you'll appear in the list as well for clarity or we replace a mock user.
        // Let's simpler: Re-render the list starting from index 3 (Rank 4).

        // Update Sticky Bar
        stickyBar.innerHTML = `
            <div style="display:flex; align-items:center; gap:15px;">
                <div style="font-weight:bold; font-size:1.2rem;">#${myRank}</div>
                <img src="${realUser.avatar}"
                    style="width:40px; height:40px; border-radius:50%; border:2px solid ${myRank <= 3 ? '#fbbf24' : 'white'};">
                <div>
                    <div style="font-weight:bold;">${userName} ${myRank <= 3 ? '🏆' : ''}</div>
                    <div style="font-size:0.8rem; opacity:0.8;">${myRank <= 3 ? 'You are in the Hall of Fame!' : 'Keep learning to climb the ranks!'}</div>
                </div>
            </div>
            <div style="font-weight:900; font-size:1.2rem;">${userXP.toLocaleString()} XP</div>
        `;

        // Render rows (Skipping top 3 for the list container, or rendering all?)
        // The HTML has a "Podium" section hardcoded. 
        // Ideally we should update the Podium too if dynamic.
        // Let's try to update Podium if "You" are in top 3.

        const top3 = allUsers.slice(0, 3);
        const rest = allUsers.slice(3);

        // Update Podium DOM
        const podiums = [
            document.querySelector('.p-1'),
            document.querySelector('.p-2'),
            document.querySelector('.p-3')
        ];

        top3.forEach((u, i) => {
            if (podiums[i]) {
                podiums[i].querySelector('.p-name').textContent = u.name;
                podiums[i].querySelector('.p-score').textContent = u.xp + ' XP';
                podiums[i].lastElementChild.textContent = u.certs + ' Certs';
                const img = podiums[i].querySelector('.avatar');
                if (u.isMe) {
                    img.src = u.avatar;
                    podiums[i].classList.add('animate-pulse'); // Highlight
                } else {
                    img.src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${u.name.split(' ')[0]}`;
                }
            }
        });

        // Render the rest list
        container.innerHTML = `
            <div class="list-row header">
                <div class="col-rank">#</div>
                <div class="col-user">Student</div>
                <div class="col-certs">Certificates</div>
                <div class="col-points">Total XP</div>
            </div>
        `;

        rest.forEach((u, index) => {
            const rank = index + 4;
            const isMeClass = u.isMe ? 'background: rgba(59, 130, 246, 0.2); border: 1px solid #3b82f6;' : '';
            const rankStyle = u.isMe ? 'color: #3b82f6; font-weight:900;' : '';

            const html = `
            <div class="list-row" style="${isMeClass}">
                <div class="col-rank" style="${rankStyle}">${rank}</div>
                <div class="col-user">
                    <img src="${u.isMe ? u.avatar : `https://api.dicebear.com/7.x/avataaars/svg?seed=${u.name}`}" style="width:30px; height:30px; border-radius:50%;">
                    ${u.name} ${u.isMe ? '(You)' : ''}
                </div>
                <div class="col-certs">${u.certs} 🏅</div>
                <div class="col-points">${u.xp}</div>
            </div>
            `;
            container.innerHTML += html;
        });

    </script>
</body>

</html>
